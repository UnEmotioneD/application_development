<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table tag</title>
  </head>
  <body>
    <h3>Table tag</h3>

    <hr />

    <table border="1">
      <caption>
        1 학기 성적
      </caption>
      <thead>
        <tr>
          <th>이름</th>
          <th>HTML</th>
          <th>성적</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>황기태</td>
          <td>80</td>
          <td>B</td>
        </tr>
        <tr>
          <td>이재문</td>
          <td>95</td>
          <td>A</td>
        </tr>
        <tr>
          <td>이병은</td>
          <td>40</td>
          <td>F</td>
        </tr>
        <tr>
          <td>김찬희</td>
          <td>100</td>
          <td>S++</td>
        </tr>
      </tbody>

      <tfoot>
        <tr>
          <th>합</th>
          <th>315</th>
          <th>평균 A</th>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
